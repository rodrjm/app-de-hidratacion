name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. Servicio de Base de Datos para el Test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dosisvital_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Install pytest and coverage
      run: |
        python -m pip install pytest pytest-django pytest-cov coverage
        
    - name: Run Tests with pytest and coverage
      env:
        # Variables DUMMY para que Django no falle al arrancar
        SECRET_KEY: 'django-insecure-test-key-for-github-actions'
        DEBUG: 'True'
        ALLOWED_HOSTS: '127.0.0.1,localhost'
        # Conexión a la DB del servicio de arriba
        DATABASE_URL: 'postgres://postgres:password@localhost:5432/dosisvital_test'
        # Variables de Integraciones (Dummies)
        MP_ACCESS_TOKEN: 'TEST-DUMMY-TOKEN'
        OPENWEATHER_API_KEY: 'dummy'
        DJANGO_SETTINGS_MODULE: 'hydrotracker.settings_sqlite'
      run: |
        cd backend
        pytest --cov=. --cov-report=xml --cov-report=term-missing --tb=short
        
    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        